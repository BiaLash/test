<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bia Hair | Agendamentos</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-blue-50 to-indigo-100 min-h-screen font-sans text-gray-800">

<!-- MODAL FOTOS (SÓ SERVIÇOS) -->
<div id="fotos" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-white p-6 rounded-2xl max-w-xl w-full relative">

    <button onclick="fecharFotos()" class="absolute top-3 right-4 text-2xl">✕</button>

    <h2 id="titulo" class="text-center font-bold text-lg mb-4"></h2>

    <div class="grid grid-cols-2 gap-3">
      <img id="img1" class="rounded-lg">
      <img id="img2" class="rounded-lg">
      <img id="img3" class="rounded-lg">
      <img id="img4" class="rounded-lg">
    </div>

    <button onclick="irAgendar()" class="mt-5 w-full bg-blue-500 text-white p-3 rounded-xl">
      Continuar para agendamento
    </button>

  </div>
</div>

<!-- MODAL AGENDAMENTO -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-3xl shadow-2xl p-6 w-full max-w-md relative">
    <button onclick="fecharModal()" class="absolute top-4 right-5 text-2xl">×</button>

    <h2 class="text-2xl font-bold text-blue-700 mb-5 text-center">Agende seu horário ✨</h2>

    <input id="nome" type="text" placeholder="Digite seu nome" class="w-full border rounded-2xl p-3 mb-3">
    <input id="data" type="date" class="w-full border rounded-2xl p-3 mb-5">

    <button onclick="enviar()" class="w-full bg-blue-400 text-white py-3 rounded-2xl">
      Continuar para o WhatsApp
    </button>
  </div>
</div>

<!-- HEADER -->
<header class="text-center py-12 px-4">
  <img src="logo.png" class="mx-auto mb-4 w-24">
  <h1 class="text-5xl font-bold text-blue-700">Bia Hair</h1>
</header>

<!-- SERVIÇOS -->
<section class="max-w-7xl mx-auto px-6 pb-12 grid sm:grid-cols-2 lg:grid-cols-4 gap-6">

  <div class="bg-white p-6 rounded-3xl shadow-lg">
    <h2 class="font-bold text-blue-500">Serviço Avulso</h2>
    <button onclick="abrirServico('Serviço Avulso')" class="w-full bg-blue-400 text-white mt-4 p-2 rounded">Agendar</button>
  </div>

  <div class="bg-white p-6 rounded-3xl shadow-lg">
    <h2 class="font-bold text-blue-500">Cabelo Longo</h2>
    <button onclick="abrirServico('Cabelo Longo')" class="w-full bg-blue-400 text-white mt-4 p-2 rounded">Agendar</button>
  </div>

  <div class="bg-white p-6 rounded-3xl shadow-lg">
    <h2 class="font-bold text-blue-500">Corte</h2>
    <button onclick="abrirServico('Corte')" class="w-full bg-blue-400 text-white mt-4 p-2 rounded">Agendar</button>
  </div>

  <div class="bg-white p-6 rounded-3xl shadow-lg">
    <h2 class="font-bold text-blue-500">Escova + Babyliss</h2>
    <button onclick="abrirServico('Escova + Babyliss')" class="w-full bg-blue-400 text-white mt-4 p-2 rounded">Agendar</button>
  </div>

</section>

<!-- PACOTES (SEM FOTO) -->
<section class="max-w-6xl mx-auto px-6 pb-12">

  <h2 class="text-3xl font-bold text-center text-blue-700 mb-8">Pacotes Mensais</h2>

  <div class="grid md:grid-cols-2 gap-6">

    <div class="bg-white p-6 rounded-3xl shadow-lg">
      <h3 class="font-bold text-blue-500">Curtos/Médios - 1x semana</h3>
      <p class="mb-2">R$ 260/mês</p>
      <button onclick="abrirPacote('Pacote curto 1x')" class="w-full bg-blue-400 text-white p-2 rounded">Agendar</button>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-lg">
      <h3 class="font-bold text-blue-500">Curtos/Médios - 2x semana</h3>
      <p class="mb-2">R$ 400/mês</p>
      <button onclick="abrirPacote('Pacote curto 2x')" class="w-full bg-blue-400 text-white p-2 rounded">Agendar</button>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-lg">
      <h3 class="font-bold text-blue-500">Longos - 1x semana</h3>
      <p class="mb-2">R$ 300/mês</p>
      <button onclick="abrirPacote('Pacote longo 1x')" class="w-full bg-blue-400 text-white p-2 rounded">Agendar</button>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-lg">
      <h3 class="font-bold text-blue-500">Longos - 2x semana</h3>
      <p class="mb-2">R$ 480/mês</p>
      <button onclick="abrirPacote('Pacote longo 2x')" class="w-full bg-blue-400 text-white p-2 rounded">Agendar</button>
    </div>

  </div>

</section>

<script>
let servicoAtual = '';

// SERVIÇOS (COM FOTO)
function abrirServico(servico) {
  servicoAtual = servico;
  document.getElementById('titulo').innerText = servico;

  if(servico === 'Serviço Avulso'){
    img1.src='avulso1.jpg'; img2.src='avulso2.jpg'; img3.src='avulso3.jpg'; img4.src='avulso4.jpg';
  }
  if(servico === 'Cabelo Longo'){
    img1.src='longo1.jpg'; img2.src='longo2.jpg'; img3.src='longo3.jpg'; img4.src='longo4.jpg';
  }
  if(servico === 'Corte'){
    img1.src='corte1.jpg'; img2.src='corte2.jpg'; img3.src='corte3.jpg'; img4.src='corte4.jpg';
  }
  if(servico === 'Escova + Babyliss'){
    img1.src='baby1.jpg'; img2.src='baby2.jpg'; img3.src='baby3.jpg'; img4.src='baby4.jpg';
  }

  document.getElementById('fotos').classList.remove('hidden');
}

// PACOTES (SEM FOTO)
function abrirPacote(pacote){
  servicoAtual = pacote;
  document.getElementById('modal').classList.remove('hidden');
}

function fecharFotos(){
  document.getElementById('fotos').classList.add('hidden');
}

function irAgendar(){
  fecharFotos();
  document.getElementById('modal').classList.remove('hidden');
}

function fecharModal(){
  document.getElementById('modal').classList.add('hidden');
}

function enviar(){
  const nome = document.getElementById('nome').value;
  const data = document.getElementById('data').value;

  if(!nome || !data){
    alert('Preencha tudo');
    return;
  }

  let msg = `Olá! Meu nome é ${nome} e quero ${servicoAtual} no dia ${data}`;
  window.open('https://wa.me/5549991273818?text=' + encodeURIComponent(msg));
}
</script>

</body>
</html>
