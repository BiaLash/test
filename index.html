<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bia Hair Premium</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.star { transition: 0.2s; }
.star:hover { transform: scale(1.3); }
</style>

</head>

<body class="bg-pink-50 font-sans">

<!-- BOTÃO ADM -->
<button onclick="toggleADM()" class="fixed left-4 top-4 bg-black text-white px-4 py-2 rounded-full z-50">
⚙️ ADM
</button>

<!-- PAINEL ADM -->
<div id="adm" class="hidden fixed left-0 top-0 h-full w-80 bg-white shadow-xl p-4 overflow-y-auto z-40">

<h2 class="font-bold text-xl mb-4">Painel Admin</h2>

<button onclick="addServico()" class="bg-green-500 text-white p-2 w-full mb-2 rounded">+ Serviço</button>
<button onclick="addPacote()" class="bg-blue-500 text-white p-2 w-full mb-2 rounded">+ Pacote</button>

<h3 class="mt-4 font-bold">Clientes</h3>
<ul id="clientes"></ul>

</div>

<!-- HEADER -->
<header class="text-center py-10">
<h1 class="text-4xl font-bold">Bia Hair Premium</h1>
<p class="text-gray-600">Beleza de alto padrão</p>
</header>

<!-- SERVIÇOS -->
<div id="servicos" class="grid grid-cols-2 gap-4 p-4"></div>

<!-- PACOTES -->
<div id="pacotes" class="p-4"></div>

<!-- MODAL FOTOS -->
<div id="fotos" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-4 rounded-xl">
<button onclick="fecharFotos()">X</button>
<div class="grid grid-cols-2 gap-2">
<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
</div>
<button onclick="irPagamento()" class="bg-pink-500 text-white p-2 w-full mt-2">Continuar</button>
</div>
</div>

<!-- PAGAMENTO -->
<div id="pagamento" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-4 rounded-xl w-80">

<h2>Pagamento</h2>

<button onclick="pix()" class="bg-green-500 text-white p-2 w-full mb-2">Pix</button>
<button onclick="alert('Pagar no local')" class="bg-blue-500 text-white p-2 w-full mb-2">Cartão</button>
<button onclick="alert('Pagar no local')" class="bg-yellow-500 text-white p-2 w-full">Dinheiro</button>

<div id="qrcode" class="mt-4 text-center"></div>

</div>
</div>

<!-- AVALIAÇÃO -->
<div id="avaliacao" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
<div class="bg-white p-6 rounded-xl text-center">

<h2>Avalie</h2>

<div class="flex justify-center text-3xl">
<span class="star" onclick="avaliar(1)">⭐</span>
<span class="star" onclick="avaliar(2)">⭐</span>
<span class="star" onclick="avaliar(3)">⭐</span>
<span class="star" onclick="avaliar(4)">⭐</span>
<span class="star" onclick="avaliar(5)">⭐</span>
</div>

</div>
</div>

<script>

let servicos = JSON.parse(localStorage.getItem("servicos")) || [
{nome:"Escova", preco:75},
{nome:"Corte", preco:80}
];

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

function render(){
let s = document.getElementById("servicos");
s.innerHTML = "";

servicos.forEach((srv,i)=>{
s.innerHTML += `
<div class="bg-white p-4 rounded shadow">
<h3>${srv.nome}</h3>
<p>R$ ${srv.preco}</p>
<button onclick="abrirFotos(${i})" class="bg-pink-500 text-white p-2 mt-2 w-full">Agendar</button>
</div>
`;
});

let c = document.getElementById("clientes");
c.innerHTML = clientes.map(c=>`<li>${c.nome} - ${c.data}</li>`).join("");
}

function abrirFotos(i){
window.servicoAtual = servicos[i];
document.getElementById("fotos").classList.remove("hidden");
}

function fecharFotos(){
document.getElementById("fotos").classList.add("hidden");
}

function irPagamento(){
fecharFotos();
document.getElementById("pagamento").classList.remove("hidden");
}

function pix(){
let chave = "josearmandocarpintero2000@gmail.com";

let url = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PIX:${chave}`;

document.getElementById("qrcode").innerHTML = `<img src="${url}">`;
}

function avaliar(n){
alert("Obrigado pela avaliação " + n);
document.getElementById("avaliacao").classList.add("hidden");
location.reload();
}

function toggleADM(){
document.getElementById("adm").classList.toggle("hidden");
}

function addServico(){
let nome = prompt("Nome");
let preco = prompt("Preço");
servicos.push({nome,preco});
localStorage.setItem("servicos", JSON.stringify(servicos));
render();
}

function addPacote(){
alert("Pacote adicionado manualmente depois");
}

render();

</script>

</body>
</html>
